<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="Assets/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <main>
      <section class="container">
        <img
          class="blog-image"
          src="assets/illustration-article.svg"
          alt="Blog preview card illustration"
        />

        <div class="content">
          <p class="category">Learning</p>
          <p class="date">Published 21 Dec 2023</p>
          <h1 class="title">HTML & CSS foundations</h1>
          <p class="description">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
        </div>

        <div class="author">
          <img
            class="user-pic"
            src="assets/image-avatar.webp"
            alt="Greg Hooper"
          />
          <p class="author-text">Greg Hooper</p>
        </div>
      </section>
    </main>

    <footer class="attribution">
      Challenge by
      <a
        href="https://www.frontendmentor.io/challenges/blog-preview-card-ckPaj01IcS"
        target="_blank"
        >Frontend Mentor</a
      >. Coded by
      <a href="https://www.frontendmentor.io/profile/lrsnvanta" target="_blank"
        >Charles Larson Vanta</a
      >.
    </footer>
  </body>
</html>

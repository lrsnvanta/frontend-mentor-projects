<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Frontend Mentor | Social links profile</title>
  </head>
  <body>
    <main>
      <section class="container">
        <div class="profile">
          <img src="assets/avatar-jessica.jpeg" alt="Jessica" />
          <div class="info">
            <h1 class="name">Jessica Randall</h1>
            <p class="location">London, United Kingdom</p>
          </div>
          <p class="bio">"Front-end developer and avid reader."</p>
        </div>

        <ul class="social-links">
          <li><a href="#">GitHub</a></li>
          <li><a href="#">Frontend Mentor</a></li>
          <li><a href="#">LinkedIn</a></li>
          <li><a href="#">Twitter</a></li>
          <li><a href="#">Instagram</a></li>
        </ul>
      </section>
    </main>

    <footer class="attribution">
      Challenge by
      <a
        href="https://www.frontendmentor.io/challenges/social-links-profile-UG32l9m6dQ"
        target="_blank"
        >Frontend Mentor</a
      >. Coded by
      <a href="https://www.frontendmentor.io/profile/lrsnvanta" target="_blank"
        >Charles Larson Vanta</a
      >.
    </footer>
  </body>
</html>

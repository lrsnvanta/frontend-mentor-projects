<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/png" href="assets/favicon-32x32.png" />
    <title>Frontend Mentor | QR code component</title>
  </head>
  <body>
    <main>
      <section class="container">
        <div class="qr-code-container">
          <img
            src="assets/image-qr-code.png"
            alt="QR code to frontendmentor.io"
          />
        </div>

        <div class="qr-code-details">
          <h1 class="title">
            Improve your front-end skills by building projects
          </h1>
          <h2 class="subtitle">
            Scan the QR code to visit Frontend Mentor and take your coding skill
            to the next level
          </h2>
        </div>
      </section>
    </main>
    <footer class="attribution">
      Challenge by
      <a
        href="https://www.frontendmentor.io/challenges/qr-code-component-iux_sIO_H"
        target="_blank"
        >Frontend Mentor</a
      >. Coded by
      <a href="https://www.frontendmentor.io/profile/lrsnvanta" target="_blank"
        >Charles Larson Vanta</a
      >.
    </footer>
  </body>
</html>
